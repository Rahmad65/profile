<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xvlover Tools — Web Screenshot Link</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      background-color: #fef8e7; /* Warna khas pastel soft biar matching */
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

  <div class="w-full max-w-4xl bg-white rounded-[2.5rem] shadow-2xl border border-orange-100 min-h-[70vh] flex flex-col overflow-hidden">
    
    <header class="bg-indigo-900 p-6 text-white flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl font-bold">📸</div>
        <div>
          <h1 class="text-lg font-bold tracking-tight">Xvlover Link Screenshot</h1>
          <p class="text-xs text-indigo-200">Mode: Dev VIP 1.0 👾</p>
        </div>
      </div>
      <span class="text-xs bg-green-500/20 text-green-400 border border-green-500/30 px-3 py-1 rounded-full font-medium">API Ready</span>
    </header>

    <main class="flex-1 p-6 md:p-8 bg-slate-50/50 flex flex-col md:flex-row gap-6">
      
      <div class="w-full md:w-5/12 flex flex-col justify-between bg-white border border-gray-100 rounded-2xl p-5 shadow-xs">
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Input URL Website / Link</label>
            <input type="url" id="targetUrl" placeholder="https://vt.tiktok.com/..." 
                   class="w-full px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 font-medium text-gray-700 transition">
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Device</label>
              <select id="deviceType" class="w-full px-3 py-2 bg-slate-50 border border-gray-200 rounded-lg text-xs font-semibold text-gray-600 focus:outline-none">
                <option value="Mobile">Mobile</option>
                <option value="Desktop">Desktop</option>
              </select>
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Type</label>
              <select id="imgType" class="w-full px-3 py-2 bg-slate-50 border border-gray-200 rounded-lg text-xs font-semibold text-gray-600 focus:outline-none">
                <option value="PNG">PNG</option>
              </select>
            </div>
          </div>
        </div>

        <button onclick="generateScreenshot()" id="btnSubmit"
                class="w-full mt-6 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm transition shadow-md shadow-indigo-600/20 active:scale-[0.98]">
          Jalankan ⚡
        </button>
      </div>

      <div class="flex-1 flex flex-col bg-white border border-gray-100 rounded-2xl p-5 shadow-xs min-h-[300px]">
        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">Result / Preview</h3>
        
        <div class="flex-1 border-2 border-dashed border-gray-100 rounded-xl flex items-center justify-center p-2 relative bg-slate-50 overflow-hidden" id="previewContainer">
          
          <div id="stateEmpty" class="text-center p-4">
            <span class="text-3xl block mb-2">🖼️</span>
            <p class="text-xs font-medium text-gray-400">Belum ada screenshot. Masukin link terus klik Jalankan, Tod!</p>
          </div>

          <div id="stateLoading" class="hidden text-center p-4">
            <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            <p class="text-xs font-medium text-indigo-600">SABAR ANJG lagi diproses... ⏳</p>
          </div>

          <img id="resultImage" src="" alt="Screenshot Result" class="hidden max-h-[350px] object-contain rounded-lg shadow-md border border-gray-200">
        </div>

        <div id="responseData" class="hidden mt-4 p-3 bg-slate-900 rounded-xl text-[11px] font-mono text-emerald-400 overflow-x-auto max-h-[100px]">
          </div>
      </div>

    </main>

    <footer class="p-4 bg-slate-50 border-t border-gray-100 flex justify-between items-center text-[10px] text-gray-400">
      <p>© 2026 Rahmad Faujan. Powered by Microlink API Integration.</p>
      <p class="font-bold text-indigo-600">Xvlover Dev VIP 🫵</p>
    </footer>

  </div>

  <script>
    async function generateScreenshot() {
      const targetUrl = document.getElementById('targetUrl').value.trim();
      const device = document.getElementById('deviceType').value;
      
      const stateEmpty = document.getElementById('stateEmpty');
      const stateLoading = document.getElementById('stateLoading');
      const resultImage = document.getElementById('resultImage');
      const responseData = document.getElementById('responseData');
      const btnSubmit = document.getElementById('btnSubmit');

      // Validasi kosong anjay
      if (!targetUrl) {
        alert('Bacot isi dulu URL-nya pea! 🫵🗿');
        return;
      }

      // Atur Tampilan ke Loading State
      stateEmpty.classList.add('hidden');
      resultImage.classList.add('hidden');
      responseData.classList.add('hidden');
      stateLoading.classList.remove('hidden');
      btnSubmit.disabled = true;
      btnSubmit.innerText = 'PROSESING... 🤔';

      try {
        // Tembak langsung ke API Microlink sesuai dengan skema payload data yang lu kasih
        const isMobile = (device === 'Mobile');
        const apiUrl = `https://api.microlink.io?url=${encodeURIComponent(targetUrl)}&screenshot=true&embed=screenshot.url&screenshot.fullPage=true&screenshot.isMobile=${isMobile}`;

        // Simulasi data response 200 OK untuk dummy manifest log biar mirip spek lu
        const responseLog = {
          "status": true,
          "message": "Success",
          "data": {
            "url": apiUrl,
            "type": "png",
            "device": device,
            "fullPage": true
          }
        };

        // Inject gambar langsung dari url response API
        resultImage.src = apiUrl;

        // Pas gambar kelar di-load sama browser
        resultImage.onload = function() {
          stateLoading.classList.add('hidden');
          resultImage.classList.remove('hidden');
          
          // Tampilin JSON log biar makin keliatan pinter wkwkwk
          responseData.innerText = JSON.stringify(responseLog, null, 2);
          responseData.classList.remove('hidden');
          
          btnSubmit.disabled = false;
          btnSubmit.innerText = 'Jalankan ⚡';
        };

        // Handle kalau gambarnya gagal render atau error
        resultImage.onerror = function() {
          throw new Error('Gagal nge-load gambar dari API endpoint.');
        };

      } catch (error) {
        alert('Wett bntr, error anjg! Coba cek link lu valid apa kaga.');
        stateLoading.classList.add('hidden');
        stateEmpty.classList.remove('hidden');
        btnSubmit.disabled = false;
        btnSubmit.innerText = 'Jalankan ⚡';
      }
    }
  </script>

</body>
</html>
